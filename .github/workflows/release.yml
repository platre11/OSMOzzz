name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: brew install protobuf

      - name: Build frontend
        run: cd dashboard && npm ci && npm run build

      - name: Build binary
        run: |
          touch crates/osmozzz-api/src/server.rs
          cargo build --release -p osmozzz-cli

      - name: Import signing certificates
        run: |
          echo "${{ secrets.APPLE_APP_CERT_P12 }}" | base64 --decode > app_certificate.p12
          echo "${{ secrets.APPLE_CERTIFICATE_P12 }}" | base64 --decode > installer_certificate.p12

          security create-keychain -p "temp-keychain" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp-keychain" build.keychain

          security import app_certificate.p12 -k build.keychain \
            -P "${{ secrets.APPLE_APP_CERT_PASSWORD }}" \
            -T /usr/bin/codesign
          security import installer_certificate.p12 -k build.keychain \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "temp-keychain" build.keychain

          xcrun notarytool store-credentials "osmozzz-notary" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}"

      - name: Create entitlements
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build PKG installer
        run: |
          mkdir -p pkg-root/usr/local/bin

          cp target/release/osmozzz pkg-root/usr/local/bin/osmozzz
          chmod +x pkg-root/usr/local/bin/osmozzz
          chmod +x scripts/pkg/postinstall

          codesign --force --options runtime --timestamp \
            --entitlements entitlements.plist \
            --sign "${{ secrets.APPLE_SIGN_IDENTITY }}" \
            pkg-root/usr/local/bin/osmozzz

          codesign --verify --deep --strict --verbose=2 pkg-root/usr/local/bin/osmozzz

          pkgbuild \
            --root pkg-root \
            --scripts scripts/pkg \
            --identifier com.osmozzz.daemon \
            --version "${GITHUB_REF_NAME}" \
            --install-location / \
            osmozzz.pkg

      - name: Sign PKG
        run: |
          productsign \
            --sign "Developer ID Installer: youssef majdoubi (RJFDA2H9FJ)" \
            --timestamp \
            osmozzz.pkg osmozzz-signed.pkg
          mv osmozzz-signed.pkg osmozzz.pkg

      - name: Notarize PKG
        run: |
          xcrun notarytool submit osmozzz.pkg \
            --keychain-profile "osmozzz-notary" \
            --wait

      - name: Staple PKG
        run: xcrun stapler staple osmozzz.pkg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: osmozzz.pkg
          body: |
            ## Installation macOS
            1. Télécharge **osmozzz.pkg**
            2. Double-clique pour installer
            3. Le dashboard s'ouvre automatiquement sur http://localhost:7878

            ## Installation Windows
            1. Télécharge **osmozzz-setup.exe**
            2. Double-clique pour installer
            3. Le dashboard s'ouvre automatiquement sur http://localhost:7878

            > Note : Windows peut afficher un avertissement SmartScreen — clique sur "Informations complémentaires" puis "Exécuter quand même"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: choco install protoc nsis --no-progress -y

      - name: Build frontend
        run: |
          Set-Location dashboard
          npm ci
          npm run build

      - name: Build binary
        run: |
          (Get-Item "crates/osmozzz-api/src/server.rs").LastWriteTime = Get-Date
          cargo build --release -p osmozzz-cli

      - name: Package release
        run: |
          New-Item -ItemType Directory dist-windows | Out-Null
          Copy-Item target/release/osmozzz.exe dist-windows/

          $version = ("${{ github.ref_name }}").TrimStart('v')
          $distDir = (Resolve-Path dist-windows).Path
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=$version /DDIST_DIR=$distDir scripts\windows\installer.nsi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: osmozzz-setup.exe
