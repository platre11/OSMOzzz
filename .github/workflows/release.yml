name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: brew install onnxruntime protobuf

      - name: Download ONNX model
        run: |
          mkdir -p models
          curl -L "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx" \
            -o models/all-MiniLM-L6-v2.onnx
          curl -L "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json" \
            -o models/tokenizer.json

      - name: Build frontend
        run: cd dashboard && npm ci && npm run build

      - name: Build binary
        env:
          ORT_DYLIB_PATH: /opt/homebrew/lib/libonnxruntime.dylib
        run: |
          touch crates/osmozzz-api/src/server.rs
          cargo build --release -p osmozzz-cli

      - name: Import signing certificates
        run: |
          # Certificat Developer ID Application (pour codesign binaires)
          echo "${{ secrets.APPLE_APP_CERT_P12 }}" | base64 --decode > app_certificate.p12

          # Certificat Developer ID Installer (pour productsign .pkg)
          echo "${{ secrets.APPLE_CERTIFICATE_P12 }}" | base64 --decode > installer_certificate.p12

          security create-keychain -p "temp-keychain" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp-keychain" build.keychain

          security import app_certificate.p12 -k build.keychain \
            -P "${{ secrets.APPLE_APP_CERT_PASSWORD }}" \
            -T /usr/bin/codesign
          security import installer_certificate.p12 -k build.keychain \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "temp-keychain" build.keychain

          xcrun notarytool store-credentials "osmozzz-notary" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}"

      - name: Create entitlements
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build PKG installer
        run: |
          # ── Structure du payload ───────────────────────────────────────────
          mkdir -p pkg-root/usr/local/bin
          mkdir -p pkg-root/usr/local/lib
          mkdir -p pkg-root/Library/OSMOzzz/models

          cp target/release/osmozzz          pkg-root/usr/local/bin/osmozzz
          cp /opt/homebrew/lib/libonnxruntime.dylib pkg-root/usr/local/lib/libonnxruntime.dylib
          cp models/all-MiniLM-L6-v2.onnx    pkg-root/Library/OSMOzzz/models/
          cp models/tokenizer.json            pkg-root/Library/OSMOzzz/models/

          chmod +x pkg-root/usr/local/bin/osmozzz
          chmod +x scripts/pkg/postinstall

          # ── Corriger le RPATH de la dylib dans le binaire ─────────────────
          install_name_tool \
            -change /opt/homebrew/lib/libonnxruntime.dylib \
                    /usr/local/lib/libonnxruntime.dylib \
            pkg-root/usr/local/bin/osmozzz

          # ── Signer la dylib avec Developer ID Application ─────────────────
          codesign --force --options runtime --timestamp \
            --sign "${{ secrets.APPLE_SIGN_IDENTITY }}" \
            pkg-root/usr/local/lib/libonnxruntime.dylib

          # ── Signer le binaire avec hardened runtime + entitlements ────────
          codesign --force --options runtime --timestamp \
            --entitlements entitlements.plist \
            --sign "${{ secrets.APPLE_SIGN_IDENTITY }}" \
            pkg-root/usr/local/bin/osmozzz

          # ── Vérification ──────────────────────────────────────────────────
          codesign --verify --deep --strict --verbose=2 pkg-root/usr/local/bin/osmozzz

          # ── Construire le .pkg ────────────────────────────────────────────
          pkgbuild \
            --root pkg-root \
            --scripts scripts/pkg \
            --identifier com.osmozzz.daemon \
            --version "${GITHUB_REF_NAME}" \
            --install-location / \
            osmozzz.pkg

      - name: Sign PKG
        run: |
          productsign \
            --sign "Developer ID Installer: youssef majdoubi (RJFDA2H9FJ)" \
            --timestamp \
            osmozzz.pkg osmozzz-signed.pkg
          mv osmozzz-signed.pkg osmozzz.pkg

      - name: Notarize PKG
        run: |
          xcrun notarytool submit osmozzz.pkg \
            --keychain-profile "osmozzz-notary" \
            --wait

      - name: Staple PKG
        run: xcrun stapler staple osmozzz.pkg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: osmozzz.pkg
          body: |
            ## Installation macOS
            1. Télécharge **osmozzz.pkg**
            2. Double-clique pour installer
            3. Le dashboard s'ouvre automatiquement sur http://localhost:7878

            ## Installation Windows
            1. Télécharge **osmozzz-setup.exe**
            2. Double-clique pour installer
            3. Le dashboard s'ouvre automatiquement sur http://localhost:7878

            > Note : Windows peut afficher un avertissement SmartScreen — clique sur "Informations complémentaires" puis "Exécuter quand même"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: choco install protoc nsis --no-progress -y

      - name: Download ONNX Runtime
        run: |
          $version = "1.20.1"
          Invoke-WebRequest `
            -Uri "https://github.com/microsoft/onnxruntime/releases/download/v${version}/onnxruntime-win-x64-${version}.zip" `
            -OutFile onnxruntime.zip
          Expand-Archive onnxruntime.zip -DestinationPath onnxruntime-dist

      - name: Download ONNX model
        run: |
          New-Item -ItemType Directory -Force models | Out-Null
          Invoke-WebRequest `
            -Uri "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx" `
            -OutFile models/all-MiniLM-L6-v2.onnx
          Invoke-WebRequest `
            -Uri "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json" `
            -OutFile models/tokenizer.json

      - name: Build frontend
        run: |
          Set-Location dashboard
          npm ci
          npm run build

      - name: Build binary
        run: |
          $env:ORT_DYLIB_PATH = "$env:GITHUB_WORKSPACE\onnxruntime-dist\onnxruntime-win-x64-1.20.1\lib\onnxruntime.dll"
          (Get-Item "crates/osmozzz-api/src/server.rs").LastWriteTime = Get-Date
          cargo build --release -p osmozzz-cli

      - name: Package release
        run: |
          # Assemble dist-windows/
          New-Item -ItemType Directory dist-windows | Out-Null
          New-Item -ItemType Directory dist-windows/models | Out-Null
          Copy-Item target/release/osmozzz.exe dist-windows/
          Copy-Item onnxruntime-dist/onnxruntime-win-x64-1.20.1/lib/onnxruntime.dll dist-windows/
          Copy-Item models/all-MiniLM-L6-v2.onnx dist-windows/models/
          Copy-Item models/tokenizer.json dist-windows/models/

          # Build NSIS installer
          $version = ("${{ github.ref_name }}").TrimStart('v')
          $distDir = (Resolve-Path dist-windows).Path
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=$version /DDIST_DIR=$distDir scripts\windows\installer.nsi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: osmozzz-setup.exe
