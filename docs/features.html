<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSMOzzz — Features</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .lang-switcher {
      display: flex; gap: 2px;
      background: rgba(255,255,255,.08);
      border-radius: 8px; padding: 3px;
    }
    .lang-btn {
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 6px;
      border: none; cursor: pointer;
      background: transparent; color: #9ca3af;
      transition: background .15s, color .15s;
    }
    .lang-btn.active { background: #fff; color: #1a1d23; }

    .features-hero {
      max-width: 1000px; margin: 0 auto;
      padding: 80px 24px 48px;
      text-align: center;
    }

    .features-grid {
      max-width: 1000px; margin: 0 auto;
      padding: 0 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .feature-block {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      transition: border-color .2s;
    }
    .feature-block:hover { border-color: #374151; }

    .feature-block-img {
      width: 100%; aspect-ratio: 16/9;
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px;
    }

    .feature-block-body { padding: 24px; }
    .feature-block-body h3 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .feature-block-body p { font-size: 13px; color: var(--muted); line-height: 1.65; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo" style="text-decoration:none">OSMOzzz</a>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
        </div>
        <a class="btn-ghost" href="https://github.com/platre11/OSMOzzz" target="_blank" rel="noreferrer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
          GitHub
        </a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <div class="features-hero">
    <h1 data-i18n="features-page.title"></h1>
    <p class="hero-sub" data-i18n="features-page.sub"></p>
  </div>

  <!-- GRID -->
  <div class="features-grid">

    <div class="feature-block">
      <div class="feature-block-img">
        <img src="assets/placeholder.png" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='📸 image à venir'" />
      </div>
      <div class="feature-block-body">
        <h3 data-i18n="features-page.f1.title"></h3>
        <p data-i18n="features-page.f1.desc"></p>
      </div>
    </div>

    <div class="feature-block">
      <div class="feature-block-img">
        <img src="assets/placeholder.png" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='📸 image à venir'" />
      </div>
      <div class="feature-block-body">
        <h3 data-i18n="features-page.f2.title"></h3>
        <p data-i18n="features-page.f2.desc"></p>
      </div>
    </div>

    <div class="feature-block">
      <div class="feature-block-img">
        <img src="assets/placeholder.png" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='📸 image à venir'" />
      </div>
      <div class="feature-block-body">
        <h3 data-i18n="features-page.f3.title"></h3>
        <p data-i18n="features-page.f3.desc"></p>
      </div>
    </div>

    <div class="feature-block">
      <div class="feature-block-img">
        <img src="assets/placeholder.png" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='📸 image à venir'" />
      </div>
      <div class="feature-block-body">
        <h3 data-i18n="features-page.f4.title"></h3>
        <p data-i18n="features-page.f4.desc"></p>
      </div>
    </div>

  </div>

  <script src="i18n.js"></script>
  <script src="lang.js"></script>

</body>
</html>
