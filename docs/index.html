<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSMOzzz — Local Memory for AI</title>
  <meta name="description" content="Give Claude access to all your data. Emails, files, messages, calendar, code — 100% local. Nothing leaves your Mac." />
  <meta property="og:title" content="OSMOzzz — Local Memory for AI" />
  <meta property="og:description" content="Give Claude access to all your data. 100% local. Nothing leaves your Mac." />
  <meta property="og:type" content="website" />
  <meta name="google-site-verification" content="b13JpwnXSf-z5nDHLwr4QVjPhDAcpXxKmozxCsw-g1k" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .lang-switcher {
      display: flex;
      gap: 2px;
      background: rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 3px;
    }
    .lang-btn {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #9ca3af;
      transition: background .15s, color .15s;
    }
    .lang-btn.active {
      background: #fff;
      color: #1a1d23;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <span class="logo">OSMOzzz</span>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
        </div>
        <a class="btn-ghost" href="https://github.com/platre11/OSMOzzz" target="_blank" rel="noreferrer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
          <span data-i18n="nav.github"></span>
        </a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-badge" data-i18n="hero.badge"></div>
    <h1 data-i18n="hero.title"></h1>
    <p class="hero-sub" data-i18n="hero.sub"></p>
    <div class="hero-actions">
      <a class="btn-download" href="https://github.com/platre11/OSMOzzz/releases/latest/download/osmozzz.pkg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span data-i18n="hero.download"></span>
      </a>
      <span class="hero-meta" data-i18n="hero.meta"></span>
    </div>
  </section>

  <!-- VISION -->
  <section class="section section-dark">
    <div class="container">
      <div class="vision-intro">
        <h2 data-i18n="vision.title"></h2>
        <p class="vision-lead" data-i18n="vision.lead"></p>
      </div>
      <div class="vision-features">
        <div class="vision-feat">
          <span class="vision-feat-icon">🔒</span>
          <div>
            <h3 data-i18n="vision.f1.title"></h3>
            <p data-i18n="vision.f1.desc"></p>
          </div>
        </div>
        <div class="vision-feat">
          <span class="vision-feat-icon">🎭</span>
          <div>
            <h3 data-i18n="vision.f2.title"></h3>
            <p data-i18n="vision.f2.desc"></p>
          </div>
        </div>
        <div class="vision-feat">
          <span class="vision-feat-icon">🚫</span>
          <div>
            <h3 data-i18n="vision.f3.title"></h3>
            <p data-i18n="vision.f3.desc"></p>
          </div>
        </div>
        <div class="vision-feat">
          <span class="vision-feat-icon">✅</span>
          <div>
            <h3 data-i18n="vision.f4.title"></h3>
            <p data-i18n="vision.f4.desc"></p>
          </div>
        </div>
        <div class="vision-feat">
          <span class="vision-feat-icon">📋</span>
          <div>
            <h3 data-i18n="vision.f5.title"></h3>
            <p data-i18n="vision.f5.desc"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- COMPARISON -->
  <section class="section">
    <div class="container">
      <h2 data-i18n="compare.title"></h2>
      <p class="section-sub" data-i18n="compare.sub"></p>
      <div class="compare-grid">

        <div class="compare-col bad">
          <div class="compare-col-header">
            <span class="compare-badge bad" data-i18n="compare.without.badge"></span>
          </div>
          <ul class="compare-list">
            <li class="compare-item bad"><span class="compare-icon">✗</span><span data-i18n="compare.without.1"></span></li>
            <li class="compare-item bad"><span class="compare-icon">✗</span><span data-i18n="compare.without.2"></span></li>
            <li class="compare-item bad"><span class="compare-icon">✗</span><span data-i18n="compare.without.3"></span></li>
            <li class="compare-item bad"><span class="compare-icon">✗</span><span data-i18n="compare.without.4"></span></li>
            <li class="compare-item bad"><span class="compare-icon">✗</span><span data-i18n="compare.without.5"></span></li>
          </ul>
        </div>

        <div class="compare-col good">
          <div class="compare-col-header">
            <span class="compare-badge good" data-i18n="compare.with.badge"></span>
          </div>
          <ul class="compare-list">
            <li class="compare-item good"><span class="compare-icon">✓</span><span data-i18n="compare.with.1"></span></li>
            <li class="compare-item good"><span class="compare-icon">✓</span><span data-i18n="compare.with.2"></span></li>
            <li class="compare-item good"><span class="compare-icon">✓</span><span data-i18n="compare.with.3"></span></li>
            <li class="compare-item good"><span class="compare-icon">✓</span><span data-i18n="compare.with.4"></span></li>
            <li class="compare-item good"><span class="compare-icon">✓</span><span data-i18n="compare.with.5"></span></li>
          </ul>
        </div>

      </div>
      <div class="compare-conclusion">
        <p data-i18n="compare.conclusion"></p>
      </div>
    </div>
  </section>

  <!-- SOURCES -->
  <section class="section section-dark">
    <div class="container">
      <h2 data-i18n="sources.title"></h2>
      <p class="section-sub" data-i18n="sources.sub"></p>
      <div class="sources-split">

        <div class="sources-col">
          <div class="sources-col-header local">
            <span class="sources-col-dot local"></span>
            <span data-i18n="sources.local.label"></span>
          </div>
          <div class="sources-cards">
            <div class="source-card local">📧<span>Gmail</span></div>
            <div class="source-card local">🌐<span>Chrome</span></div>
            <div class="source-card local">🧭<span>Safari</span></div>
            <div class="source-card local">💬<span>iMessage</span></div>
            <div class="source-card local">📝<span>Apple Notes</span></div>
            <div class="source-card local">📅<span>Calendar</span></div>
            <div class="source-card local">💻<span>Terminal</span></div>
            <div class="source-card local">📁<span>Files</span></div>
          </div>
        </div>

        <div class="sources-divider"></div>

        <div class="sources-col">
          <div class="sources-col-header cloud">
            <span class="sources-col-dot cloud"></span>
            <span data-i18n="sources.cloud.label"></span>
          </div>
          <div class="sources-cards">
            <div class="source-card cloud">◻<span>Notion</span></div>
            <div class="source-card cloud">⌥<span>GitHub</span></div>
            <div class="source-card cloud">◈<span>Linear</span></div>
            <div class="source-card cloud">◉<span>Jira</span></div>
            <div class="source-card cloud">⚡<span>Supabase</span></div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="section section-cta">
    <div class="container" style="text-align:center">
      <h2 data-i18n="cta.title"></h2>
      <p class="section-sub" data-i18n="cta.sub"></p>
      <a class="btn-download" href="https://github.com/platre11/OSMOzzz/releases/latest/download/osmozzz.pkg" style="margin:32px auto 0;display:inline-flex">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span data-i18n="cta.download"></span>
      </a>
      <a class="btn-ghost" href="https://github.com/platre11/OSMOzzz" target="_blank" rel="noreferrer" style="margin-top:12px;display:inline-flex">
        <span data-i18n="cta.github"></span>
      </a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <span class="logo" style="font-size:14px">OSMOzzz</span>
      <span style="color:#4b5563;font-size:13px">MIT License</span>
      <a href="https://github.com/platre11/osmozzz" target="_blank" rel="noreferrer" style="color:#6b7280;font-size:13px">GitHub →</a>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script src="lang.js"></script>

</body>
</html>
